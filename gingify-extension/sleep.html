<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Snoozed — Gingify</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --text: #e8e8e8;
      --domain: #ffffff;
      --muted: #9e9e9e;
      --subtle: #616161;
      --hint: #424242;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f5;
        --text: #1a1a1a;
        --domain: #1a1a1a;
        --muted: #555555;
        --subtle: #777777;
        --hint: #999999;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      cursor: pointer;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
    }

    .favicon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: contain;
    }

    .domain {
      font-size: 18px;
      font-weight: 600;
      color: var(--domain);
    }

    .message {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .ram-saved {
      font-size: 13px;
      color: var(--subtle);
      margin-top: 4px;
    }

    .hint {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: var(--hint);
    }
  </style>
</head>
<body>
  <img id="favicon" class="favicon" alt="" style="display:none">
  <div id="domain" class="domain">Tab is snoozed</div>
  <div class="message">This tab is snoozed.<br>Click anywhere to wake it up.</div>
  <div id="ram-saved" class="ram-saved" style="display:none"></div>
  <div class="hint">Gingify — Tab Memory Manager</div>

  <script src="sleep.js"></script>
</body>
</html>
