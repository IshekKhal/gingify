<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gingify — Welcome</title>
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>
  <!-- Drag bar: gives a grab target since decorations are off, hosts the close button -->
  <div class="drag-bar">
    <button id="close-btn" class="close-btn" aria-label="Close" title="Close">&#215;</button>
  </div>

  <div class="container" id="container">

    <!-- App icon -->
    <img src="../icons/128x128.png" alt="Gingify" style="width:48px;height:48px;margin-bottom:8px;object-fit:contain;" />

    <!-- Headline — filled by JS with live system values -->
    <p class="headline" id="headline">
      Loading your system info…
    </p>

    <!-- Description -->
    <p class="description">
      Gingify will monitor your app's RAM usage<br />
      and free it automatically when your PC gets slow.
    </p>

    <!-- Threshold row -->
    <div class="threshold-row">
      <label for="threshold-select">Auto-free RAM when usage exceeds:</label>
      <select id="threshold-select">
        <option value="70">70%</option>
        <option value="75">75%</option>
        <option value="80" selected>80%</option>
        <option value="85">85%</option>
        <option value="90">90%</option>
      </select>
    </div>

    <!-- CTA -->
    <button id="get-started-btn" class="btn-primary">Get Started</button>

    <!-- Hint -->
    <p class="hint">It's already running in your system tray ↘</p>

  </div>

  <script src="onboarding.js"></script>
</body>
</html>
